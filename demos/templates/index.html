<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIGHTNING - Neurosymbolic Safety Layer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🛡️ LIGHTNING Demo</span>
            <div class="navbar-nav flex-row">
                <a class="nav-link me-3" href="/">Main</a>
                <a class="nav-link me-3" href="/adversarial">Adversarial</a>
                <a class="nav-link me-3" href="/audit">Audit</a>
                <a class="nav-link me-3" href="/visualization">Visualization</a>
                <a class="nav-link" href="/agent-explorer">Agent</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>1. Input Protocol</h5>
                    </div>
                    <div class="card-body">
                        <textarea id="protocol-input" class="form-control" rows="15"
                                  placeholder="Paste protocol here..."></textarea>
                        <button id="analyze-btn" class="btn btn-primary mt-3 w-100">
                            <span id="analyze-spinner" class="spinner-border spinner-border-sm d-none"></span>
                            Analyze Protocol
                        </button>
                        <div id="examples" class="mt-3">
                            <select id="example-select" class="form-select">
                                <option value="">Select example...</option>
                                <option value="benign">Benign Chemistry</option>
                                <option value="hydrazine">ITAR Controlled</option>
                                <option value="cross-regime">Cross-Regime</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>2. Reasoning</h5>
                    </div>
                    <div class="card-body" id="reasoning-pane">
                        <div class="text-muted">Enter a protocol to see reasoning...</div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>3. Decision</h5>
                    </div>
                    <div class="card-body" id="decision-pane">
                        <div class="text-muted">Analysis results will appear here...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
